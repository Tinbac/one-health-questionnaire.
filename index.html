<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Health Questionnaire</title>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            padding: 20px;
            margin: 0;
        }

        .form-container {
            max-width: 600px;
            background: #ffffff;
            margin: 20px auto;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h2 {
            color: #2c3e50;
            margin-top: 0;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #34495e;
        }

        input[type="text"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .gps-button {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            margin-bottom: 15px;
        }

        .gps-button:hover {
            background-color: #219653;
        }

        .gps-button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }

        #gps-status {
            font-size: 14px;
            color: #7f8c8d;
            margin-top: -10px;
            margin-bottom: 15px;
            display: block;
        }

        .submit-button {
            background-color: #2980b9;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 4px;
            font-size: 18px;
            width: 100%;
            cursor: pointer;
        }

        .submit-button:hover {
            background-color: #2471a3;
        }
    </style>
</head>

<body>

<div class="form-container">

<h2>One Health Questionnaire</h2>

<form id="questionnaireForm">

<div class="form-group">
<label>Location Coordinates</label>
<button type="button" class="gps-button" id="getGPSBtn">
📍 Auto-Fill Current GPS Location
</button>
<span id="gps-status"></span>
</div>

<div class="form-group">
<label for="latitude">Latitude</label>
<input type="text" id="latitude" readonly>
</div>

<div class="form-group">
<label for="longitude">Longitude</label>
<input type="text" id="longitude" readonly>
</div>

<div class="form-group">
<label for="accuracy">GPS Accuracy (meters)</label>
<input type="text" id="accuracy" readonly>
</div>

<hr>

<div class="form-group">
<label for="respondent">Respondent Name / ID</label>
<input type="text" id="respondent" required>
</div>

<div class="form-group">
<label for="interface">
Primary Human-Animal-Environment Interface observed:
</label>

<select id="interface">
<option value="">-- Select Option --</option>
<option value="domestic_livestock">Domestic Livestock Farming</option>
<option value="wildlife_boundary">Wildlife/Forest Boundary</option>
<option value="waste_management">Water/Waste Management Site</option>
<option value="urban_market">Live Animal Market</option>
<option value="other">Other</option>
</select>
</div>

<button class="submit-button" type="submit">
Submit Questionnaire
</button>

</form>

</div>

<script>

document.getElementById('getGPSBtn').addEventListener('click', function () {

    const status = document.getElementById('gps-status');
    const latInput = document.getElementById('latitude');
    const lonInput = document.getElementById('longitude');
    const accInput = document.getElementById('accuracy');
    const btn = document.getElementById('getGPSBtn');

    if (!navigator.geolocation) {
        status.textContent = "❌ Geolocation is not supported.";
        return;
    }

    status.textContent = "⏳ Locating...";
    status.style.color = "#d35400";
    btn.disabled = true;

    navigator.geolocation.getCurrentPosition(

        function(position){

            latInput.value = position.coords.latitude.toFixed(6);
            lonInput.value = position.coords.longitude.toFixed(6);
            accInput.value = position.coords.accuracy.toFixed(1);

            status.textContent = "✅ Location captured successfully!";
            status.style.color = "#27ae60";
            btn.disabled = false;

        },

        function(error){

            btn.disabled = false;
            status.style.color = "#c0392b";

            switch(error.code){

                case error.PERMISSION_DENIED:
                    status.textContent="❌ Permission denied.";
                    break;

                case error.POSITION_UNAVAILABLE:
                    status.textContent="❌ GPS unavailable.";
                    break;

                case error.TIMEOUT:
                    status.textContent="❌ GPS timed out.";
                    break;

                default:
                    status.textContent="❌ Unknown error.";
            }

        },

        {
            enableHighAccuracy:true,
            timeout:10000,
            maximumAge:0
        }

    );

});


document.getElementById("questionnaireForm").addEventListener("submit", function(e){

    e.preventDefault();

    const submitBtn=document.querySelector(".submit-button");

    submitBtn.disabled=true;
    submitBtn.textContent="Sending Data...";

    // <<< REPLACE THIS URL >>>
    const webAppUrl="https://script.google.com/macros/s/AKfycbyHOJgOYom_K370MpKm3H86kbEGQoWc66sUxY3W5qxL4eROLl-NjvuBYV3lrrK9mXW-nA/exec";

    const formData={

        latitude:document.getElementById("latitude").value,
        longitude:document.getElementById("longitude").value,
        accuracy:document.getElementById("accuracy").value,
        respondent:document.getElementById("respondent").value,
        interface:document.getElementById("interface").value

    };

    fetch(webAppUrl,{

        method:"POST",
        mode:"no-cors",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify(formData)

    })

    .then(()=>{

        alert("✅ Questionnaire submitted successfully!");

        document.getElementById("questionnaireForm").reset();
        document.getElementById("gps-status").textContent="";

        submitBtn.disabled=false;
        submitBtn.textContent="Submit Questionnaire";

    })

    .catch(error=>{

        alert("❌ "+error);

        submitBtn.disabled=false;
        submitBtn.textContent="Submit Questionnaire";

    });

});

</script>

</body>
</html>
