<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Health Questionnaire</title>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f7;
            padding: 20px;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .form-container {
            width: 100%;
            max-width: 600px;
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        h2 {
            color: #2c3e50;
            margin-top: 0;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #34495e;
        }

        input[type="text"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .gps-button {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            font-size: 15px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-bottom: 15px;
            transition: background-color 0.2s;
        }

        .gps-button:hover {
            background-color: #219653;
        }

        .gps-button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }

        #gps-status {
            font-size: 14px;
            color: #7f8c8d;
            margin-top: -10px;
            margin-bottom: 15px;
            display: block;
        }

        .submit-button {
            background-color: #2980b9;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 4px;
            font-size: 16px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
        }

        .submit-button:hover {
            background-color: #2471a3;
        }
        
        .submit-button:disabled {
            background-color: #bdc3c7;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>One Health Questionnaire</h2>
    
    <form id="questionnaireForm">
        <div class="form-group">
            <label>Location Coordinates</label>
            <button type="button" class="gps-button" id="getGPSBtn">📍 Auto-Fill Current GPS Location</button>
            <span id="gps-status">⏳ Initializing automated GPS request...</span>
        </div>

        <div class="form-group">
            <label for="latitude">Latitude</label>
            <input type="text" id="latitude" name="latitude" readonly placeholder="Waiting for GPS entry...">
        </div>

        <div class="form-group">
            <label for="longitude">Longitude</label>
            <input type="text" id="longitude" name="longitude" readonly placeholder="Waiting for GPS entry...">
        </div>

        <div class="form-group">
            <label for="accuracy">GPS Accuracy (meters)</label>
            <input type="text" id="accuracy" name="accuracy" readonly placeholder="Waiting for GPS entry...">
        </div>

        <hr style="border: 0; border-top: 1px solid #ecf0f1; margin: 30px 0;">

        <div class="form-group">
            <label for="respondent">Respondent Name / ID</label>
            <input type="text" id="respondent" name="respondent" required>
        </div>

        <div class="form-group">
            <label for="interface">Primary Human-Animal-Environment Interface observed:</label>
            <select id="interface" name="interface">
                <option value="">-- Select Option --</option>
                <option value="domestic_livestock">Domestic Livestock Farming</option>
                <option value="wildlife_boundary">Wildlife/Forest Boundary</option>
                <option value="waste_management">Water/Waste Management Site</option>
                <option value="urban_market">Live Animal Market</option>
                <option value="other">Other</option>
            </select>
        </div>

        <button type="submit" class="submit-button" id="submitBtn">Submit Questionnaire</button>
    </form>
</div>

<script>
    const latInput = document.getElementById('latitude');
    const lonInput = document.getElementById('longitude');
    const accInput = document.getElementById('accuracy');
    const status = document.getElementById('gps-status');
    const btn = document.getElementById('getGPSBtn');

    function acquireGPS() {
        if (!navigator.geolocation) {
            status.textContent = "❌ Geolocation is not supported by your browser.";
            status.style.color = "#c0392b";
            return;
        }

        status.textContent = "⏳ Automatically locating... please wait.";
        status.style.color = "#d35400";
        btn.disabled = true;

        const options = {
            enableHighAccuracy: true,
            timeout: 15000, 
            maximumAge: 0
        };

        navigator.geolocation.getCurrentPosition(
            function(position) {
                latInput.value = position.coords.latitude.toFixed(6);
                lonInput.value = position.coords.longitude.toFixed(6);
                accInput.value = position.coords.accuracy.toFixed(1);
                
                status.textContent = "✅ Location captured successfully!";
                status.style.color = "#27ae60";
                btn.disabled = false;
            },
            function(error) {
                btn.disabled = false;
                status.style.color = "#c0392b";
                switch(error.code) {
                    case error.PERMISSION_DENIED:
                        status.textContent = "❌ Permission denied. Please unlock location settings in your browser bar.";
                        break;
                    case error.POSITION_UNAVAILABLE:
                        status.textContent = "❌ Location unavailable (Weak GPS fix). Move outdoors or near windows.";
                        break;
                    case error.TIMEOUT:
                        status.textContent = "❌ Request timed out. Retrying execution...";
                        // FIXED: Changed incorrect function reference to correct function name 'acquireGPS'
                        setTimeout(acquireGPS, 2000); 
                        break;
                    default:
                        status.textContent = "❌ An unknown hardware error occurred.";
                        break;
                }
            },
            options
        );
    }

    // Run automatically on page load
    window.onload = function() {
        acquireGPS();
    };

    // Manual button fallback
    btn.addEventListener('click', function () {
        acquireGPS();
    });

    // Form Submission Process
    document.getElementById("questionnaireForm").addEventListener("submit", function(e) {
        e.preventDefault();

        if (!latInput.value || !lonInput.value) {
            alert("⚠️ Please wait until your device locks a GPS location before submitting.");
            return;
        }

        const submitBtn = document.getElementById("submitBtn");
        submitBtn.disabled = true;
        submitBtn.textContent = "Sending Data...";

        // NOTE: If you deploy a brand new Web App, replace this URL with your new one!
        const webAppUrl = "https://script.google.com/macros/s/AKfycbxfrw0K-NU9h4_OUhe7DZmtsEtTAk6_cv4l2P49BBLSlpXNmrJA60KxdkqW6uuxK-JvcA/exec";

        const formData = {
            latitude: latInput.value,
            longitude: lonInput.value,
            accuracy: accInput.value,
            respondent: document.getElementById("respondent").value,
            interface: document.getElementById("interface").value
        };

        fetch(webAppUrl, {
            method: "POST",
            mode: "no-cors", 
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(formData)
        })
        .then(() => {
            alert("✅ Questionnaire submitted successfully!");
            document.getElementById("questionnaireForm").reset();
            status.textContent = "";
            submitBtn.disabled = false;
            submitBtn.textContent = "Submit Questionnaire";
            
            // Instantly start locking location for the next form entry
            acquireGPS();
        })
        .catch(error => {
            alert("❌ Submission error encountered: " + error);
            submitBtn.disabled = false;
            submitBtn.textContent = "Submit Questionnaire";
        });
    });
</script>

</body>
</html>
